<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Hub</title>
    
    <!-- Instant redirect check -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const item = urlParams.get('item');
        if (item) {
            window.location.replace(`https://huggingface.co/datasets/notamitgamer/uploads/resolve/main/${item}`);
        }
    </script>

    <!-- Fonts: Lexend & Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Lexend', 'sans-serif'],
                    },
                    colors: {
                        // Strict M3 Color Palette (Light/Dark)
                        m3: {
                            background: '#FDFCFB',
                            backgroundDark: '#1A1C19',
                            surface: '#FDFCFB',
                            surfaceDark: '#1A1C19',
                            surfaceContainer: '#F1F1EA',
                            surfaceContainerDark: '#2D2F2B',
                            surfaceContainerHigh: '#EBEBE4',
                            surfaceContainerHighDark: '#333531',
                            surfaceContainerHighest: '#E5E6DE',
                            surfaceContainerHighestDark: '#434541',
                            onSurface: '#1A1C19',
                            onSurfaceDark: '#E3E3DC',
                            onSurfaceVariant: '#43483E',
                            onSurfaceVariantDark: '#C3C8BC',
                            primary: '#386A20',
                            primaryDark: '#9CD67D',
                            onPrimary: '#FFFFFF',
                            onPrimaryDark: '#0C3900',
                            secondaryContainer: '#D7E8CD',
                            secondaryContainerDark: '#374B2E',
                            onSecondaryContainer: '#111F0F',
                            onSecondaryContainerDark: '#D7E8CD',
                            error: '#BA1A1A',
                            errorDark: '#FFB4AB',
                            errorContainer: '#FFDAD6',
                            errorContainerDark: '#93000A',
                            onErrorContainer: '#410002',
                            onErrorContainerDark: '#FFDAD6',
                            outline: '#74796D',
                            outlineDark: '#8D9286',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Zero animations, instant state changes only */
        body {
            background-color: #FDFCFB; 
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }
        @media (prefers-color-scheme: dark) {
            body { background-color: #1A1C19; }
        }
        
        /* Instant focus states, no transitions */
        input:focus {
            outline: none;
            border-bottom-color: #386A20;
        }
        @media (prefers-color-scheme: dark) {
            input:focus { border-bottom-color: #9CD67D; }
        }
        
        /* Utility classes for instant display toggling */
        .show { display: block !important; }
        .show-flex { display: flex !important; }
        .hide { display: none !important; }
    </style>
</head>
<body class="bg-m3-background dark:bg-m3-backgroundDark text-m3-onSurface dark:text-m3-onSurfaceDark flex flex-col items-center justify-center min-h-screen p-4 font-sans">

    <div id="ui-container" class="w-full max-w-[480px] hide">
        
        <!-- Minimal Header -->
        <div class="mb-8">
            <h1 class="text-2xl font-bold tracking-tight">Upload</h1>
            <p class="text-sm text-m3-onSurfaceVariant dark:text-m3-onSurfaceVariantDark mt-1">Store files permanently on Hugging Face</p>
        </div>

        <!-- Static Input Field -->
        <div class="flex flex-col gap-1.5 mb-6">
            <label for="custom-id" class="text-sm font-medium text-m3-onSurfaceVariant dark:text-m3-onSurfaceVariantDark">Custom ID (Optional)</label>
            <input type="text" id="custom-id" placeholder="e.g., source-code" class="px-4 py-3 bg-m3-surfaceContainerHighest dark:bg-m3-surfaceContainerHighestDark text-m3-onSurface dark:text-m3-onSurfaceDark rounded-t-md border-b-2 border-m3-outline dark:border-m3-outlineDark placeholder-gray-500">
        </div>

        <!-- Solid M3 Dropzone (No dashed borders, solid surface) -->
        <div id="dropzone" class="bg-m3-surfaceContainer dark:bg-m3-surfaceContainerDark hover:bg-m3-surfaceContainerHigh dark:hover:bg-m3-surfaceContainerHighDark rounded-[24px] p-10 flex flex-col items-center justify-center cursor-pointer mb-6 border border-transparent">
            <span class="material-symbols-outlined text-[48px] text-m3-primary dark:text-m3-primaryDark mb-4">upload</span>
            <span class="text-base font-semibold text-m3-onSurface dark:text-m3-onSurfaceDark">Click or drag file</span>
            <span class="text-sm mt-1 text-m3-onSurfaceVariant dark:text-m3-onSurfaceVariantDark">Max 4.5MB per file</span>
            <input type="file" id="file-input" class="hidden">
        </div>

        <!-- Progress Bar (Utilitarian, no animation on width change) -->
        <div id="progress-container" class="hide mb-6">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-semibold text-m3-onSurfaceVariant dark:text-m3-onSurfaceVariantDark">Uploading...</span>
                <span id="progress-text" class="text-sm font-bold text-m3-primary dark:text-m3-primaryDark">0%</span>
            </div>
            <div class="w-full bg-m3-surfaceContainerHighest dark:bg-m3-surfaceContainerHighestDark h-2 rounded-none">
                <div id="progress-bar" class="bg-m3-primary dark:bg-m3-primaryDark h-2 rounded-none" style="width: 0%;"></div>
            </div>
        </div>

        <!-- Skeleton Loading Container -->
        <div id="skeleton-container" class="hide animate-pulse bg-m3-surfaceContainer dark:bg-m3-surfaceContainerDark p-4 rounded-[16px] mb-6">
            <div class="flex items-center gap-2 mb-3">
                <div class="w-5 h-5 rounded-full bg-m3-surfaceContainerHighest dark:bg-m3-surfaceContainerHighestDark"></div>
                <div class="w-32 h-4 rounded bg-m3-surfaceContainerHighest dark:bg-m3-surfaceContainerHighestDark"></div>
            </div>
            <div class="bg-m3-background dark:bg-m3-backgroundDark p-3 rounded-[8px] flex flex-col gap-3">
                <div class="w-full h-4 rounded bg-m3-surfaceContainerHighest dark:bg-m3-surfaceContainerHighestDark"></div>
                <div class="w-3/4 h-4 rounded bg-m3-surfaceContainerHighest dark:bg-m3-surfaceContainerHighestDark"></div>
                <div class="flex gap-2 w-full mt-1">
                    <div class="flex-1 h-9 rounded-[8px] bg-m3-surfaceContainerHighest dark:bg-m3-surfaceContainerHighestDark"></div>
                    <div class="flex-1 h-9 rounded-[8px] bg-m3-surfaceContainerHighest dark:bg-m3-surfaceContainerHighestDark"></div>
                </div>
            </div>
        </div>

        <!-- Success Result -->
        <div id="result-container" class="hide bg-m3-secondaryContainer dark:bg-m3-secondaryContainerDark p-4 rounded-[16px] mb-6 border border-transparent">
            <div class="flex items-center gap-2 mb-3">
                <span class="material-symbols-outlined text-m3-onSecondaryContainer dark:text-m3-onSecondaryContainerDark">check_circle</span>
                <span class="font-bold text-m3-onSecondaryContainer dark:text-m3-onSecondaryContainerDark text-sm">Upload Successful</span>
            </div>
            <div class="flex flex-col gap-3 bg-m3-background dark:bg-m3-backgroundDark p-3 rounded-[8px]">
                <div id="final-link-text" class="text-sm text-m3-onSurface dark:text-m3-onSurfaceDark break-all select-all font-medium"></div>
                <div class="flex gap-2 w-full">
                    <button id="copy-btn" class="flex-1 bg-m3-primary dark:bg-m3-primaryDark text-m3-onPrimary dark:text-m3-onPrimaryDark px-3 py-2 rounded-[8px] text-sm font-medium hover:bg-opacity-90 active:bg-opacity-100 flex items-center justify-center gap-1.5 border border-transparent">
                        <span class="material-symbols-outlined text-[18px]" id="copy-icon">content_copy</span>
                        <span>Copy</span>
                    </button>
                    <a id="open-btn" href="#" target="_blank" class="flex-1 bg-m3-surfaceContainerHighest dark:bg-m3-surfaceContainerHighestDark text-m3-onSurface dark:text-m3-onSurfaceDark px-3 py-2 rounded-[8px] text-sm font-medium hover:bg-opacity-90 active:bg-opacity-100 flex items-center justify-center gap-1.5 no-underline border border-transparent">
                        <span class="material-symbols-outlined text-[18px]">open_in_new</span>
                        <span>Open</span>
                    </a>
                </div>
            </div>
        </div>

        <!-- Error Container -->
        <div id="error-container" class="hide bg-m3-errorContainer dark:bg-m3-errorContainerDark text-m3-onErrorContainer dark:text-m3-onErrorContainerDark p-4 rounded-[16px] mb-6">
            <div class="flex items-start gap-3">
                <span class="material-symbols-outlined">error</span>
                <span id="error-text" class="text-sm font-medium mt-0.5"></span>
            </div>
        </div>

    </div>

    <!-- Copyright Footer (Pinned to the bottom of the screen) -->
    <div class="fixed bottom-4 left-0 w-full text-center text-xs font-medium text-m3-outline dark:text-m3-outlineDark z-10 pointer-events-none">
        &copy; 2026 notamitgamer
    </div>

    <script>
        // Reveal UI only if not redirecting
        if (!item) {
            document.getElementById('ui-container').classList.remove('hide');
            document.getElementById('ui-container').classList.add('show');
        }

        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('file-input');
        const customIdInput = document.getElementById('custom-id');
        
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        
        const skeletonContainer = document.getElementById('skeleton-container');
        
        const resultContainer = document.getElementById('result-container');
        const finalLinkText = document.getElementById('final-link-text');
        const copyBtn = document.getElementById('copy-btn');
        const copyIcon = document.getElementById('copy-icon');
        const openBtn = document.getElementById('open-btn');
        
        const errorContainer = document.getElementById('error-container');
        const errorText = document.getElementById('error-text');

        // Drag & Drop Handling (Instant state swaps, no transition classes)
        dropzone.addEventListener('click', () => fileInput.click());

        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.style.borderColor = 'var(--tw-colors-m3-primary)';
        });
        
        dropzone.addEventListener('dragleave', () => {
            dropzone.style.borderColor = 'transparent';
        });
        
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.style.borderColor = 'transparent';
            if (e.dataTransfer.files.length) {
                uploadFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                uploadFile(fileInput.files[0]);
            }
        });

        // Copy Button Logic (Instant text swap)
        copyBtn.addEventListener('click', () => {
            const linkToCopy = openBtn.href;
            navigator.clipboard.writeText(linkToCopy).then(() => {
                copyIcon.textContent = 'check';
                copyBtn.querySelector('span:last-child').textContent = 'Copied';
                
                setTimeout(() => {
                    copyIcon.textContent = 'content_copy';
                    copyBtn.querySelector('span:last-child').textContent = 'Copy';
                }, 2000);
            }).catch(err => {
                // Fallback for older browsers or restricted frames
                const tempTextArea = document.createElement("textarea");
                tempTextArea.value = linkToCopy;
                tempTextArea.style.position = "fixed";
                tempTextArea.style.opacity = "0";
                document.body.appendChild(tempTextArea);
                tempTextArea.select();
                document.execCommand("copy");
                document.body.removeChild(tempTextArea);
                
                copyIcon.textContent = 'check';
                copyBtn.querySelector('span:last-child').textContent = 'Copied';
                setTimeout(() => { 
                    copyIcon.textContent = 'content_copy'; 
                    copyBtn.querySelector('span:last-child').textContent = 'Copy';
                }, 2000);
            });
        });

        function resetUI() {
            progressContainer.classList.remove('show');
            progressContainer.classList.add('hide');
            skeletonContainer.classList.remove('show');
            skeletonContainer.classList.add('hide');
            resultContainer.classList.remove('show');
            resultContainer.classList.add('hide');
            errorContainer.classList.remove('show-flex');
            errorContainer.classList.add('hide');
            progressBar.style.width = '0%';
            progressText.innerText = '0%';
        }

        // Real Progress Upload Logic via XMLHttpRequest
        function uploadFile(file) {
            resetUI();

            if (file.size > 4.5 * 1024 * 1024) {
                errorText.innerText = "File exceeds 4.5MB serverless limit.";
                errorContainer.classList.remove('hide');
                errorContainer.classList.add('show-flex');
                return;
            }

            progressContainer.classList.remove('hide');
            progressContainer.classList.add('show');

            const formData = new FormData();
            formData.append('file', file);
            
            const customId = customIdInput.value.trim();
            if (customId) formData.append('custom_id', customId);

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/upload', true);

            xhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                    const percentComplete = Math.round((e.loaded / e.total) * 100);
                    // Instant width update, no CSS transition
                    progressBar.style.width = percentComplete + '%';
                    progressText.innerText = percentComplete + '%';
                    
                    // Show skeleton loader once file is sent but awaiting HF response
                    if (percentComplete === 100) {
                        progressContainer.classList.remove('show');
                        progressContainer.classList.add('hide');
                        skeletonContainer.classList.remove('hide');
                        skeletonContainer.classList.add('show');
                    }
                }
            };

            xhr.onload = function() {
                progressContainer.classList.remove('show');
                progressContainer.classList.add('hide');
                skeletonContainer.classList.remove('show');
                skeletonContainer.classList.add('hide');
                
                if (xhr.status >= 200 && xhr.status < 300) {
                    try {
                        const data = JSON.parse(xhr.responseText);
                        const finalUrl = `${window.location.origin}/?item=${data.item_id}`;
                        
                        finalLinkText.innerText = finalUrl;
                        openBtn.href = finalUrl;
                        
                        resultContainer.classList.remove('hide');
                        resultContainer.classList.add('show');
                        
                        fileInput.value = '';
                        customIdInput.value = '';
                    } catch(err) {
                        errorText.innerText = "Invalid response from server.";
                        errorContainer.classList.remove('hide');
                        errorContainer.classList.add('show-flex');
                    }
                } else {
                    try {
                        const errData = JSON.parse(xhr.responseText);
                        errorText.innerText = errData.detail || 'Upload failed.';
                    } catch(err) {
                        errorText.innerText = "Upload failed.";
                    }
                    errorContainer.classList.remove('hide');
                    errorContainer.classList.add('show-flex');
                }
            };

            xhr.onerror = function() {
                progressContainer.classList.remove('show');
                progressContainer.classList.add('hide');
                skeletonContainer.classList.remove('show');
                skeletonContainer.classList.add('hide');
                errorText.innerText = "System error: Could not connect to server.";
                errorContainer.classList.remove('hide');
                errorContainer.classList.add('show-flex');
            };

            xhr.send(formData);
        }
    </script>
</body>
</html>
